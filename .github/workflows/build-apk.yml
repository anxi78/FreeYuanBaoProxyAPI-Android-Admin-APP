# ═══════════════════════════════════════════
#  元宝Admin — Android APK Build (GitHub Actions)
# ═══════════════════════════════════════════
#  工作流说明：
#  1. 在 GitHub 上创建仓库并推送源码
#  2. 此工作流会自动编译 Release APK
#  3. 编译产物在 Actions 页面 Artifacts 中下载
#
#  首次使用：
#  1. Fork/Create repo → git push
#  2. GitHub → Actions 标签页 → 选择此工作流
#  3. 点击 "Run workflow" → 选择分支 → 运行
#  4. 等待完成 → 下载 yb-admin-release.apk
# ═══════════════════════════════════════════

name: Build APK

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'android/**'
  workflow_dispatch:    # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 设置 JDK 17
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 设置 Gradle（自动下载 wrapper 所需版本）
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: wrapper

      # 4. 编译 Release APK
      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew 2>/dev/null || true
          gradle assembleRelease --no-daemon

      # 5. 上传 APK 到 Action Artifacts
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yb-admin-release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error
